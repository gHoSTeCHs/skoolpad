<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Question Builder · v4 — document-mode authoring</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* =============================================================
     TOKENS — Warm Editorial (Light) + Warm Editorial (Dark)
     Mirrors resources/css/app.css so production diff is clean
     ============================================================= */
  :root {
    --bg:            #F7F2E9;
    --bg-raised:     #F3EDE7;
    --bg-deep:       #EDE5D2;
    --surface:       #FBF8F1;
    --surface-2:     #F0E9DB;
    --surface-3:     #E8DFCB;
    --border:        #E0D6C2;
    --border-2:      #F3EDE7;
    --border-strong: #C9BCA0;
    --fg:            #1F1A12;
    --fg-2:          #3F352A;
    --fg-muted:      #6B5E47;
    --fg-subtle:     #9C8E73;

    --primary:       #1A6B4F;
    --primary-fg:    #FBF8F1;
    --primary-soft:  #DCE8DD;
    --primary-line:  #A6C4A8;
    --primary-hover: #0C7B56;

    --honey:         #B8862F;
    --honey-soft:    #F4E8CC;
    --honey-line:    #E0C679;

    --ember:         #B8411F;
    --ember-soft:    rgba(212,84,43,0.08);

    --success:       #0D9668;
    --warning:       #D4952A;
    --danger:        #B8411F;

    --correct-bg:    rgba(13, 150, 104, 0.07);
    --correct-line:  #A6C4A8;
    --correct-dot:   #0D9668;
    --wrong-bg:      rgba(212, 84, 43, 0.05);
    --wrong-line:    #E5B8A6;

    --shadow-sm: 0 1px 0 rgba(31,26,18,0.04), 0 1px 2px rgba(31,26,18,0.04);
    --shadow-md: 0 4px 12px -4px rgba(31,26,18,0.08), 0 2px 4px rgba(31,26,18,0.04);
    --shadow-lg: 0 18px 40px -20px rgba(31,26,18,0.18), 0 4px 12px -6px rgba(31,26,18,0.08);

    --font-display: 'Bricolage Grotesque', Georgia, serif;
    --font-body:    'DM Sans', -apple-system, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  html.dark {
    --bg:            #161210;
    --bg-raised:     #1F1A16;
    --bg-deep:       #110D0B;
    --surface:       #1B1612;
    --surface-2:     #241D17;
    --surface-3:     #2C231C;
    --border:        #322820;
    --border-2:      #281F19;
    --border-strong: #4A3D31;
    --fg:            #F4ECDD;
    --fg-2:          #D8CFBE;
    --fg-muted:      #9F9379;
    --fg-subtle:     #6F664E;

    --primary:       #4FB18C;
    --primary-fg:    #0E120F;
    --primary-soft:  rgba(79,177,140,0.10);
    --primary-line:  rgba(79,177,140,0.40);
    --primary-hover: #62C09E;

    --honey:         #E0B564;
    --honey-soft:    rgba(224,181,100,0.12);
    --honey-line:    rgba(224,181,100,0.45);

    --ember:         #E48868;
    --ember-soft:    rgba(228,136,104,0.10);

    --correct-bg:    rgba(79, 177, 140, 0.10);
    --correct-line:  rgba(79, 177, 140, 0.50);
    --correct-dot:   #4FB18C;
    --wrong-bg:      rgba(228, 136, 104, 0.08);
    --wrong-line:    rgba(228, 136, 104, 0.35);

    --shadow-sm: 0 1px 0 rgba(0,0,0,0.30), 0 1px 2px rgba(0,0,0,0.30);
    --shadow-md: 0 4px 14px -4px rgba(0,0,0,0.50), 0 2px 4px rgba(0,0,0,0.25);
    --shadow-lg: 0 28px 50px -20px rgba(0,0,0,0.55), 0 8px 14px -6px rgba(0,0,0,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; opacity: 0.6; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-subtle); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ============================================================= */
  /* SHELL — fixed inset-0; topbar + 3-column body                  */
  /* ============================================================= */
  .qb-shell {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 232px 320px minmax(0, 1fr) auto;
    background: var(--bg);
  }

  /* ============================================================= */
  /* TOP BAR                                                        */
  /* ============================================================= */
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center;
    padding: 0 16px 0 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 14px;
    z-index: 30;
    position: relative;
  }
  .topbar .mark {
    display: flex; align-items: center; gap: 10px;
    padding-right: 12px;
    margin-right: 4px;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  .topbar .mark-glyph {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 13px; font-weight: 700;
    color: var(--primary-fg);
    background: var(--primary);
    border-radius: 7px;
    letter-spacing: -0.02em;
  }
  .topbar .mark-label {
    font-family: var(--font-display);
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.005em;
    color: var(--fg);
  }
  .topbar .crumbs {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 13px; color: var(--fg-muted);
    min-width: 0;
  }
  .topbar .crumb {
    color: var(--fg-muted);
    cursor: pointer;
    transition: color 0.12s;
  }
  .topbar .crumb:hover { color: var(--fg); }
  .topbar .crumb-sep { color: var(--fg-subtle); }
  .topbar .crumb-active {
    color: var(--fg);
    font-weight: 500;
    font-family: var(--font-display);
    letter-spacing: -0.005em;
    font-size: 14px;
  }
  .topbar .spacer { flex: 1; }
  .topbar .save-state {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.02em;
    color: var(--fg-subtle);
  }
  .save-state .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }
  .save-state.dirty .dot { background: var(--honey); animation: pulse-honey 1.4s ease-in-out infinite; }
  @keyframes pulse-honey { 50% { opacity: 0.45; } }

  .topbar .tbtn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg-muted);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
  }
  .topbar .tbtn:hover {
    background: var(--bg-raised);
    color: var(--fg);
    border-color: var(--border-strong);
  }
  .topbar .tbtn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--primary-fg);
    font-weight: 600;
  }
  .topbar .tbtn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .topbar .model-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 9px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    cursor: pointer;
  }
  .topbar .model-chip:hover { background: var(--surface-2); color: var(--fg); }
  .topbar .model-chip svg { color: var(--honey); }
  .topbar .theme-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg-muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .topbar .theme-toggle:hover { background: var(--bg-raised); color: var(--fg); }

  /* ============================================================= */
  /* COL 1 — Sections                                               */
  /* ============================================================= */
  .col-sections {
    grid-row: 2;
    grid-column: 1;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .col-head {
    padding: 13px 16px 11px;
    border-bottom: 1px solid var(--border-2);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg-raised) 100%);
  }
  .col-head .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    margin-bottom: 4px;
  }
  .col-head .title {
    font-family: var(--font-display);
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.005em;
    line-height: 1.3;
    color: var(--fg);
  }
  .col-head .meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 5px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fg-subtle);
  }
  .col-head .meta .meta-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--fg-subtle);
  }
  .col-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 8px 24px;
  }
  .col-section-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    border-left: 2px solid transparent;
    margin-left: -2px;
    user-select: none;
  }
  .col-section-row:hover { background: var(--bg-raised); }
  .col-section-row[data-selected="true"] {
    background: var(--surface-2);
    border-left-color: var(--primary);
  }
  .col-section-row .sec-letter {
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
    background: var(--bg-raised);
    color: var(--fg-muted);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .col-section-row[data-selected="true"] .sec-letter {
    background: var(--primary);
    color: var(--primary-fg);
  }
  .col-section-row .sec-body {
    flex: 1; min-width: 0;
  }
  .col-section-row .sec-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .col-section-row .sec-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    margin-top: 1px;
  }
  .col-section-row .sec-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    padding: 2px 6px;
    background: var(--bg-raised);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .col-section-row[data-selected="true"] .sec-count {
    background: var(--primary-soft);
    color: var(--primary);
  }

  .col-add-section {
    margin: 8px 4px 16px;
    width: calc(100% - 8px);
    padding: 10px 12px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--fg-subtle);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
    display: flex; align-items: center; gap: 8px;
  }
  .col-add-section:hover { color: var(--fg); border-color: var(--primary-line); background: var(--primary-soft); }

  .col-divider {
    margin: 8px 12px 10px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-subtle);
  }

  .col-misc-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    border-left: 2px solid transparent;
    margin-left: -2px;
    user-select: none;
  }
  .col-misc-row:hover { background: var(--bg-raised); }
  .col-misc-row[data-selected="true"] {
    background: var(--surface-2);
    border-left-color: var(--honey);
  }
  .col-misc-row .misc-glyph {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 5px;
    background: var(--honey-soft);
    color: var(--honey);
    flex-shrink: 0;
  }
  .col-misc-row .misc-label {
    flex: 1;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--fg);
  }
  .col-misc-row .misc-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
  }

  /* ============================================================= */
  /* COL 2 — Questions at the current drill level                   */
  /* ============================================================= */
  .col-questions {
    grid-row: 2;
    grid-column: 2;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .col2-head {
    padding: 11px 14px 10px;
    border-bottom: 1px solid var(--border-2);
    background: var(--surface);
  }
  .col2-crumbs {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fg-subtle);
    letter-spacing: 0.02em;
    line-height: 1.4;
    flex-wrap: wrap;
  }
  .col2-crumbs .cseg {
    padding: 2px 5px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--fg-muted);
  }
  .col2-crumbs .cseg:hover { background: var(--bg-raised); color: var(--fg); }
  .col2-crumbs .cseg-leaf { color: var(--fg); font-weight: 600; cursor: default; }
  .col2-crumbs .cseg-sep { color: var(--fg-subtle); padding: 0 2px; opacity: 0.6; }

  .col2-title {
    margin-top: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .col2-title .t {
    font-family: var(--font-display);
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: -0.005em;
    color: var(--fg);
    flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .col2-title .t-count {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fg-subtle);
    flex-shrink: 0;
  }

  .col2-bulkbar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-2);
    background: var(--bg-raised);
  }
  .col2-bulkbar .bb-act {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg-muted);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
  }
  .col2-bulkbar .bb-act:hover { background: var(--bg-raised); color: var(--fg); border-color: var(--border-strong); }
  .col2-bulkbar .bb-act-ai { color: var(--honey); border-color: var(--honey-line); }
  .col2-bulkbar .bb-act-ai:hover { background: var(--honey-soft); }
  .col2-bulkbar .bb-spacer { flex: 1; }

  .col2-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .col-q-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.10s;
    border-left: 2px solid transparent;
    margin: 0 -2px;
    user-select: none;
    background: transparent;
  }
  .col-q-row:hover { background: var(--bg-raised); }
  .col-q-row[data-selected="true"] {
    background: var(--surface-2);
    border-left-color: var(--primary);
  }
  .col-q-row .qnum {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    text-align: left;
  }
  .col-q-row .qbody {
    min-width: 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .col-q-row .qstem {
    font-size: 12.5px;
    color: var(--fg-2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.35;
  }
  .col-q-row[data-selected="true"] .qstem { color: var(--fg); font-weight: 500; }
  .col-q-row .qmeta {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
  }
  .col-q-row .type-pip {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--bg-raised);
    color: var(--fg-muted);
  }
  .col-q-row[data-selected="true"] .type-pip {
    background: var(--primary-soft);
    color: var(--primary);
  }
  .col-q-row .marks-pip {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--fg-subtle);
  }
  .col-q-row .qchildren {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.04em;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--honey-soft);
    color: var(--honey);
  }
  .col-q-row .qright {
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .col-q-row .dots {
    display: inline-flex;
    gap: 2px;
  }
  .col-q-row .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border-strong);
  }
  .col-q-row .dot[data-fill="full"]    { background: var(--success); }
  .col-q-row .dot[data-fill="partial"] { background: var(--honey); }
  .col-q-row .dot[data-fill="empty"]   { background: var(--border-strong); }
  .col-q-row .drill-chev {
    color: var(--fg-subtle);
    font-size: 11px;
    transition: transform 0.14s, color 0.12s;
  }
  .col-q-row:hover .drill-chev { color: var(--fg); }

  .col-q-add {
    margin: 8px 0 0;
    padding: 9px 12px;
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 7px;
    color: var(--fg-subtle);
    font-family: var(--font-body);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
    display: flex; align-items: center; gap: 6px;
  }
  .col-q-add:hover {
    color: var(--fg);
    border-color: var(--primary-line);
    background: var(--primary-soft);
  }

  .col2-empty {
    padding: 28px 20px;
    text-align: center;
    color: var(--fg-subtle);
    font-size: 13px;
    line-height: 1.55;
  }
  .col2-empty strong { color: var(--fg-muted); }

  .col-ctx-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.12s;
    border-left: 2px solid transparent;
    margin: 0 -2px 2px;
  }
  .col-ctx-row:hover { background: var(--bg-raised); }
  .col-ctx-row[data-selected="true"] {
    background: var(--surface-2);
    border-left-color: var(--honey);
  }
  .col-ctx-row .ctx-glyph {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 5px;
    background: var(--honey-soft);
    color: var(--honey);
    flex-shrink: 0;
  }
  .col-ctx-row .ctx-body { flex: 1; min-width: 0; }
  .col-ctx-row .ctx-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .col-ctx-row .ctx-meta {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--fg-subtle);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .col-ctx-row .ctx-uses {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    padding: 1px 6px;
    background: var(--bg-raised);
    border-radius: 4px;
  }

  /* ============================================================= */
  /* EDITOR (center)                                                */
  /* ============================================================= */
  .editor {
    grid-row: 2;
    grid-column: 3;
    background: var(--bg);
    overflow: hidden;          /* stop scroll here; savebar anchors to this box */
    position: relative;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .editor-inner {
    flex: 1 1 auto;
    min-height: 0;             /* required so the flex child can shrink + scroll */
    overflow-y: auto;
    overflow-x: hidden;
    max-width: 880px;
    width: 100%;
    margin: 0 auto;
    padding: 0 56px 96px;      /* bottom padding leaves room behind the savebar */
  }

  /* === Sticky question header === */
  .qhead-sticky {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding-top: 20px;
    margin: 0 -56px;
    padding-left: 56px;
    padding-right: 56px;
  }
  .qhead-sticky::after {
    content: '';
    position: absolute;
    inset: auto 0 -16px 0;
    height: 16px;
    background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    pointer-events: none;
  }
  .qhead-crumbs {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .qhead-crumbs .sep { opacity: 0.5; }
  .qhead-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.018em;
    line-height: 1.15;
    color: var(--fg);
    margin: 0;
    display: flex; align-items: baseline; gap: 12px;
    flex-wrap: wrap;
  }
  .qhead-num {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg-subtle);
    letter-spacing: 0.02em;
    font-weight: 500;
  }
  .qhead-meta {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px;
    padding-bottom: 16px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
  }
  .badge--type {
    background: var(--primary-soft);
    color: var(--primary);
    border: 1px solid var(--primary-line);
  }
  .badge--marks {
    background: var(--bg-raised);
    color: var(--fg-2);
    border: 1px solid var(--border);
    font-family: var(--font-mono);
  }
  .badge--status-published { background: var(--primary-soft); color: var(--primary); }
  .badge--status-in_review { background: var(--honey-soft); color: var(--honey); }
  .badge--status-draft { background: var(--bg-raised); color: var(--fg-muted); }

  /* === Section anchor strip === */
  .anchor-strip {
    position: sticky;
    top: 124px;
    z-index: 9;
    margin: 0 -56px 28px;
    padding: 6px 56px;
    background: var(--bg);
    border-bottom: 1px solid var(--border-2);
    display: flex; gap: 4px;
    align-items: center;
  }
  .anchor-link {
    padding: 5px 10px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--fg-subtle);
    cursor: pointer;
    transition: all 0.12s;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .anchor-link:hover { color: var(--fg); background: var(--bg-raised); }
  .anchor-link[aria-current="true"] { color: var(--primary); background: var(--primary-soft); }
  .anchor-link .count-pip {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    background: var(--bg-raised);
    color: var(--fg-muted);
  }
  .anchor-link[aria-current="true"] .count-pip { background: var(--primary); color: var(--primary-fg); }
  .anchor-spacer { flex: 1; }
  .anchor-strip .strip-saved {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
  }

  /* === Doc sections === */
  .doc-section {
    margin-bottom: 40px;
    scroll-margin-top: 180px;
  }
  .doc-section-head {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px;
  }
  .doc-section-head h2 {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    margin: 0;
  }
  .doc-section-head .hint {
    font-size: 12px;
    color: var(--fg-subtle);
    flex: 1;
  }
  .doc-section-head .h-action {
    background: transparent;
    border: 0;
    color: var(--fg-muted);
    font-size: 11.5px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 5px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .doc-section-head .h-action:hover { color: var(--fg); background: var(--bg-raised); }

  /* === Stem composer === */
  .stem-composer {
    position: relative;
  }
  .stem-toolbar {
    display: flex; align-items: center; gap: 1px;
    padding: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 0;
    border-radius: 8px 8px 0 0;
  }
  .stem-tool {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 0;
    border-radius: 5px;
    color: var(--fg-muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .stem-tool:hover { background: var(--bg-raised); color: var(--fg); }
  .stem-tool[data-active="true"] { background: var(--bg-raised); color: var(--fg); }
  .stem-tool-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
  .stem-tool .key {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
  }
  .stem-body {
    min-height: 140px;
    padding: 18px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 0 8px 8px;
    font-family: var(--font-body);
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--fg);
    outline: none;
    transition: border-color 0.18s;
  }
  .stem-body:focus { border-color: var(--primary-line); box-shadow: 0 0 0 3px var(--primary-soft); }
  .stem-body p { margin: 0 0 0.9em; }
  .stem-body p:last-child { margin-bottom: 0; }
  .stem-body code {
    font-family: var(--font-mono);
    font-size: 0.88em;
    background: var(--bg-raised);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .stem-body pre {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--bg-raised);
    border-left: 2px solid var(--border-strong);
    padding: 10px 14px;
    margin: 0.9em 0;
    overflow-x: auto;
    white-space: pre;
    line-height: 1.5;
  }
  .stem-body :focus-visible { outline: none; }

  /* === Options (MCQ) === */
  .opt-list {
    display: grid;
    gap: 8px;
  }
  .opt-row {
    display: flex; align-items: stretch;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.12s;
    overflow: hidden;
  }
  .opt-row:hover { border-color: var(--border-strong); }
  .opt-row[data-correct="true"] {
    background: var(--correct-bg);
    border-color: var(--correct-line);
  }
  .opt-row .opt-marker {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 16px 12px;
    gap: 6px;
    border-right: 1px solid var(--border);
    background: var(--bg-raised);
    min-width: 44px;
  }
  .opt-row[data-correct="true"] .opt-marker {
    background: rgba(13,150,104,0.04);
    border-right-color: var(--correct-line);
  }
  .opt-letter {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--fg-muted);
  }
  .opt-row[data-correct="true"] .opt-letter { color: var(--correct-dot); }
  .opt-correct-toggle {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .opt-correct-toggle:hover { border-color: var(--fg-muted); }
  .opt-row[data-correct="true"] .opt-correct-toggle {
    background: var(--correct-dot);
    border-color: var(--correct-dot);
  }
  .opt-correct-toggle .check {
    color: white;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .opt-row[data-correct="true"] .opt-correct-toggle .check { opacity: 1; }

  .opt-body {
    flex: 1;
    padding: 14px 16px;
    font-size: 14.5px;
    line-height: 1.55;
    outline: none;
    color: var(--fg);
    min-height: 22px;
  }
  .opt-body:empty:before {
    content: attr(data-ph);
    color: var(--fg-subtle);
    font-style: italic;
  }
  .opt-actions {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 12px 10px 4px;
  }
  .opt-act {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 0; border-radius: 5px;
    color: var(--fg-subtle);
    cursor: pointer;
    transition: all 0.12s;
    opacity: 0;
  }
  .opt-row:hover .opt-act { opacity: 1; }
  .opt-act:hover { background: var(--bg-raised); color: var(--fg); }

  .opt-add {
    margin-top: 4px;
    padding: 10px 14px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--fg-subtle);
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
    display: flex; align-items: center; gap: 6px;
  }
  .opt-add:hover {
    border-color: var(--primary-line);
    background: var(--primary-soft);
    color: var(--primary);
  }

  /* === Matching === */
  .match-list { display: grid; gap: 8px; }
  .match-row {
    display: grid;
    grid-template-columns: 1fr 28px 1fr 32px;
    gap: 8px;
    align-items: stretch;
  }
  .match-cell {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    color: var(--fg);
    outline: none;
    min-height: 22px;
  }
  .match-cell:focus { border-color: var(--primary-line); box-shadow: 0 0 0 3px var(--primary-soft); }
  .match-cell:empty:before { content: attr(data-ph); color: var(--fg-subtle); font-style: italic; }
  .match-link {
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-subtle);
    font-family: var(--font-mono); font-size: 11px;
  }
  .match-remove {
    background: transparent; border: 0;
    color: var(--fg-subtle);
    cursor: pointer; border-radius: 5px;
    opacity: 0; transition: all 0.12s;
  }
  .match-row:hover .match-remove { opacity: 1; }
  .match-remove:hover { background: var(--bg-raised); color: var(--ember); }

  /* === Theory / Free form correct response === */
  .freeform-correct {
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--primary);
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--fg);
    outline: none;
    min-height: 80px;
  }
  .freeform-correct:focus { border-left-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .freeform-correct:empty:before { content: attr(data-ph); color: var(--fg-subtle); font-style: italic; }
  .freeform-hint {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--fg-subtle);
    letter-spacing: 0.04em;
  }

  /* === Numeric === */
  .num-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .num-field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 12px 14px;
  }
  .num-field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-subtle);
    margin-bottom: 6px;
  }
  .num-field input {
    width: 100%;
    background: transparent;
    border: 0;
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 14.5px;
    outline: none;
  }

  /* === Group children panel === */
  .group-children {
    display: grid;
    gap: 8px;
  }
  .gchild {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .gchild:hover { border-color: var(--border-strong); background: var(--bg-raised); }
  .gchild .gc-num {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    min-width: 24px;
  }
  .gchild .gc-stem {
    font-size: 14px;
    color: var(--fg);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .gchild .gc-type {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-raised);
    color: var(--fg-muted);
  }
  .gchild .gc-marks {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    padding: 2px 8px;
    background: var(--bg-raised);
    border-radius: 4px;
  }

  /* === Answer depths === */
  .depths-bar {
    display: flex; align-items: center; gap: 0;
    padding: 4px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 9px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .depth-seg {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-muted);
    transition: all 0.12s;
    background: transparent;
    border: 0;
    position: relative;
  }
  .depth-seg:hover:not([data-active="true"]) { color: var(--fg); }
  .depth-seg[data-active="true"] {
    background: var(--surface);
    color: var(--fg);
    box-shadow: var(--shadow-sm);
  }
  .depth-seg .seg-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border-strong);
  }
  .depth-seg[data-fill="full"] .seg-dot   { background: var(--success); }
  .depth-seg[data-fill="partial"] .seg-dot{ background: var(--honey); }
  .depth-seg[data-fill="empty"] .seg-dot  { background: var(--border-strong); }
  .depth-seg .seg-label-2 {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    letter-spacing: 0.04em;
  }

  .depth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 24px;
  }
  .depth-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--border);
  }
  .depth-card-head .dh-left {
    display: flex; align-items: baseline; gap: 12px;
  }
  .depth-card-head h3 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.012em;
    color: var(--fg);
  }
  .depth-card-head .dh-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-subtle);
  }
  .depth-card-head .dh-actions {
    display: flex; align-items: center; gap: 6px;
  }
  .dh-act {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg-muted);
    font-size: 11.5px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .dh-act:hover { background: var(--bg-raised); color: var(--fg); border-color: var(--border-strong); }
  .dh-act.dh-act-ai {
    color: var(--honey);
    border-color: var(--honey-line);
  }
  .dh-act.dh-act-ai:hover { background: var(--honey-soft); color: var(--honey); }

  .depth-body {
    min-height: 100px;
    font-family: var(--font-body);
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--fg);
    outline: none;
    padding: 0;
  }
  .depth-body p { margin: 0 0 0.8em; }
  .depth-body p:last-child { margin-bottom: 0; }
  .depth-body code {
    font-family: var(--font-mono);
    font-size: 0.88em;
    background: var(--bg-raised);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .depth-body em { color: var(--fg-muted); font-style: italic; }
  .depth-body:empty:before { content: attr(data-ph); color: var(--fg-subtle); font-style: italic; }
  .depth-body .formula {
    display: block;
    margin: 0.9em 0;
    padding: 12px 16px;
    background: var(--bg-raised);
    border-left: 2px solid var(--border-strong);
    border-radius: 0 4px 4px 0;
    font-family: var(--font-mono);
    font-size: 13.5px;
  }

  .depth-empty {
    display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
    padding: 18px 0 4px;
    color: var(--fg-subtle);
  }
  .depth-empty .e-line {
    font-style: italic;
    font-size: 13.5px;
  }
  .depth-empty .e-actions { display: flex; gap: 8px; }
  .depth-empty .e-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
  }
  .depth-empty .e-btn:hover { border-color: var(--primary-line); background: var(--primary-soft); color: var(--primary); }
  .depth-empty .e-btn.e-btn-ai { color: var(--honey); border-color: var(--honey-line); }
  .depth-empty .e-btn.e-btn-ai:hover { background: var(--honey-soft); }

  /* === Metadata strip === */
  .meta-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .meta-cell {
    padding: 14px 16px;
    background: var(--surface);
    display: flex; flex-direction: column; gap: 4px;
  }
  .meta-cell label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-subtle);
  }
  .meta-cell .meta-value {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--fg);
    letter-spacing: -0.008em;
    cursor: pointer;
  }
  .meta-cell .meta-value:hover { color: var(--primary); }
  .meta-cell .meta-value.placeholder { color: var(--fg-subtle); font-style: italic; font-weight: 500; }

  /* === Draft state empty === */
  .draft-marquee {
    background: var(--honey-soft);
    border: 1px dashed var(--honey-line);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    color: var(--honey);
    font-size: 13px;
  }
  .draft-marquee svg { flex-shrink: 0; }

  /* ============================================================= */
  /* SAVE BAR — appears when dirty                                  */
  /* ============================================================= */
  .savebar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    padding: 12px 56px;
    display: flex; align-items: center; gap: 14px;
    transform: translateY(120%);
    transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 20;
  }
  .savebar.show { transform: translateY(0); }
  .savebar .sb-text {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.02em;
  }
  .savebar .sb-text strong { color: var(--fg); font-family: var(--font-body); font-weight: 600; font-size: 13px; }
  .savebar .sb-btn {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
  }
  .savebar .sb-btn:hover { background: var(--bg-raised); border-color: var(--border-strong); }
  .savebar .sb-btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--primary-fg);
    font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .savebar .sb-btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .savebar .sb-kbd {
    font-family: var(--font-mono);
    font-size: 9.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
  }

  /* ============================================================= */
  /* INSPECTOR (right peek rail + slide-out panel)                  */
  /* ============================================================= */
  .inspector-rail {
    grid-row: 2;
    grid-column: 4;
    width: 52px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 12px 0;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
    z-index: 15;
  }
  .inspector-btn {
    width: 36px; height: 36px;
    border: 0;
    background: transparent;
    border-radius: 8px;
    color: var(--fg-muted);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.14s;
    position: relative;
  }
  .inspector-btn:hover { background: var(--bg-raised); color: var(--fg); }
  .inspector-btn[data-active="true"] {
    background: var(--primary);
    color: var(--primary-fg);
  }
  .inspector-btn .ipip {
    position: absolute;
    top: 4px; right: 4px;
    min-width: 14px; height: 14px;
    padding: 0 3px;
    background: var(--ember);
    color: white;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .inspector-btn[data-active="true"] .ipip { background: white; color: var(--primary); }

  .inspector-rail .rail-spacer { flex: 1; }

  /* Sheet overlay — backdrop sits over the whole shell when panel is open */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(15, 11, 6, 0.42);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    z-index: 40;
  }
  html.dark .sheet-overlay { background: rgba(0, 0, 0, 0.55); }
  .sheet-overlay.open { opacity: 1; pointer-events: auto; }

  /* Inspector panel — fixed sheet that slides in from the right.
     Pulled out of the grid so it overlays the rail rather than displacing it
     (matches the shadcn <Sheet> behaviour used in content studio). */
  .inspector-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 400px;
    max-width: 92vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    transform: translateX(calc(100% + 12px));
    transition: transform 0.34s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 50;
    will-change: transform;
  }
  .inspector-panel.open { transform: translateX(0); }

  .ipanel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg-raised) 100%);
  }
  .ipanel-head h3 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    color: var(--fg);
  }
  .ipanel-head h3 .ip-pip {
    font-family: var(--font-mono);
    font-size: 10px;
    margin-left: 6px;
    padding: 1px 6px;
    background: var(--bg-raised);
    border-radius: 4px;
    color: var(--fg-muted);
  }
  .ipanel-close {
    width: 24px; height: 24px;
    background: transparent;
    border: 0; border-radius: 5px;
    color: var(--fg-subtle);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ipanel-close:hover { background: var(--bg-raised); color: var(--fg); }

  .ipanel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
  }

  /* Inspector — link cards / context cards / history items */
  .ilink {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    margin-bottom: 6px;
    transition: all 0.12s;
  }
  .ilink:hover { background: var(--bg-raised); border-color: var(--border-strong); }
  .ilink .il-glyph {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ilink .il-glyph.topic   { background: var(--primary-soft); color: var(--primary); }
  .ilink .il-glyph.block   { background: var(--honey-soft);   color: var(--honey); }
  .ilink .il-glyph.context { background: var(--honey-soft);   color: var(--honey); }
  .ilink .il-body { flex: 1; min-width: 0; }
  .ilink .il-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ilink .il-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .ilink .il-remove {
    background: transparent;
    border: 0; border-radius: 4px;
    width: 22px; height: 22px;
    color: var(--fg-subtle);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .ilink:hover .il-remove { opacity: 1; }
  .ilink .il-remove:hover { background: var(--ember-soft); color: var(--ember); }

  .iadd {
    width: 100%;
    margin-top: 4px;
    padding: 10px 12px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 7px;
    color: var(--fg-subtle);
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
    display: flex; align-items: center; gap: 6px;
  }
  .iadd:hover { color: var(--fg); border-color: var(--primary-line); background: var(--primary-soft); }

  .ipanel-section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 14px 0 8px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .ipanel-section-head:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
  .ipanel-section-head h4 {
    margin: 0;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-subtle);
  }
  .ipanel-section-head .ipsh-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
  }

  /* AI suggestion card */
  .ai-suggest {
    background: linear-gradient(135deg, var(--honey-soft) 0%, transparent 80%);
    border: 1px solid var(--honey-line);
    border-radius: 9px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .ai-suggest .ai-hd {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .ai-suggest .ai-hd-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--honey);
    font-weight: 600;
  }
  .ai-suggest p {
    margin: 0 0 10px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--fg);
  }
  .ai-suggest .ai-actions { display: flex; gap: 6px; }
  .ai-suggest .ai-btn {
    padding: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--honey-line);
    border-radius: 5px;
    color: var(--honey);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
  }
  .ai-suggest .ai-btn:hover { background: var(--honey-soft); }
  .ai-suggest .ai-btn-secondary { color: var(--fg-muted); border-color: var(--border); }
  .ai-suggest .ai-btn-secondary:hover { background: var(--bg-raised); }

  /* History */
  .hist-item {
    display: flex; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border-2);
  }
  .hist-item:last-child { border-bottom: 0; }
  .hist-stub {
    width: 8px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    padding-top: 4px;
  }
  .hist-stub .hd {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--primary);
  }
  .hist-stub .hd.published { background: var(--success); }
  .hist-stub .hd.draft { background: var(--honey); }
  .hist-stub .hd.create { background: var(--fg-muted); }
  .hist-stub .hline {
    flex: 1;
    width: 1px;
    background: var(--border);
    margin-top: 4px;
  }
  .hist-body {
    flex: 1;
    padding-bottom: 4px;
  }
  .hist-body .hb-line {
    font-size: 12.5px;
    color: var(--fg);
  }
  .hist-body .hb-line strong { font-weight: 600; }
  .hist-body .hb-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  /* AI panel */
  .ai-prompt {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .ai-prompt textarea {
    width: 100%;
    min-height: 80px;
    background: transparent;
    border: 0;
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.5;
    resize: none;
    outline: none;
  }
  .ai-prompt .ap-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    margin-top: 8px;
  }
  .ai-prompt .ap-foot select {
    background: transparent;
    border: 0;
    color: var(--fg-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    cursor: pointer;
  }
  .ai-prompt .ap-foot .ap-go {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--primary);
    border: 0;
    color: var(--primary-fg);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .ai-quickact {
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--fg);
    font-size: 12.5px;
    cursor: pointer;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.12s;
  }
  .ai-quickact:hover { border-color: var(--honey-line); background: var(--honey-soft); }
  .ai-quickact svg { color: var(--honey); flex-shrink: 0; }
  .ai-quickact .aqa-sub {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
  }

  /* ============================================================= */
  /* TYPE PICKER (modal-like) for draft mode                         */
  /* ============================================================= */
  .type-picker {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .type-tile {
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.14s;
    text-align: left;
    display: flex; flex-direction: column; gap: 4px;
  }
  .type-tile:hover {
    border-color: var(--primary-line);
    background: var(--primary-soft);
  }
  .type-tile[data-active="true"] {
    border-color: var(--primary);
    background: var(--primary-soft);
    box-shadow: var(--shadow-sm);
  }
  .type-tile .tt-head {
    display: flex; align-items: center; gap: 8px;
  }
  .type-tile .tt-glyph {
    width: 24px; height: 24px;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-raised);
    color: var(--fg-muted);
  }
  .type-tile[data-active="true"] .tt-glyph { background: var(--primary); color: var(--primary-fg); }
  .type-tile .tt-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--fg);
  }
  .type-tile .tt-hint {
    font-size: 11.5px;
    color: var(--fg-muted);
  }

  /* ============================================================= */
  /* OVERLAYS — popovers + dropdowns                                 */
  /* ============================================================= */
  .popover {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-lg);
    padding: 6px;
    min-width: 200px;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: all 0.14s;
  }
  .popover.open {
    opacity: 1;
    pointer-events: auto;
    transform: none;
  }
  .pop-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--fg);
    cursor: pointer;
    transition: background 0.10s;
  }
  .pop-item:hover { background: var(--bg-raised); }
  .pop-item .pip {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-subtle);
  }
  .pop-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
  .pop-label {
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-subtle);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--fg);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: 7px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Utility */
  .ico { width: 14px; height: 14px; flex-shrink: 0; }
  .ico-sm { width: 12px; height: 12px; flex-shrink: 0; }
  .ico-lg { width: 16px; height: 16px; flex-shrink: 0; }
  .sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip-path: inset(50%); }

  /* Subtle paper grain on editor */
  .editor {
    background-image:
      radial-gradient(rgba(31,26,18,0.015) 1px, transparent 1px);
    background-size: 18px 18px;
  }
  html.dark .editor {
    background-image:
      radial-gradient(rgba(244,236,221,0.018) 1px, transparent 1px);
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="qb-shell" id="qb-shell">

      Log
    </button>
    <button class="tbtn" type="button">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
      Share
    </button>
    <button class="tbtn tbtn-primary" type="button">

      <svg class="ico" id="theme-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="ico" id="theme-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- =========================== COL 1 — SECTIONS =========================== -->
  <aside class="col-sections" aria-label="Paper sections">
    <div class="col-head">
      <div class="eyebrow">Paper</div>
      <div class="title">2023 Final Examination</div>
      <div class="meta" id="paper-meta">
        <span>COS101</span>
        <span class="meta-dot"></span>
        <span id="paper-meta-sections">2 sections</span>
        <span class="meta-dot"></span>
        <span id="paper-meta-questions">5 questions</span>
      </div>
    </div>
    <div class="col-scroll" id="col1-scroll">
      <!-- Sections + Contexts rendered by JS -->
    </div>
  </aside>

  <!-- =========================== COL 2 — QUESTIONS (drill-aware) =========================== -->
  <aside class="col-questions" aria-label="Questions">
    <div class="col2-head" id="col2-head">
      <!-- Breadcrumb + title rendered by JS -->
    </div>
    <div class="col2-bulkbar" id="col2-bulkbar">
      <!-- Bulk actions rendered by JS -->
    </div>
    <div class="col2-scroll" id="col2-scroll">
      <!-- Items rendered by JS -->
    </div>
  </aside>

  <!-- =========================== EDITOR =========================== -->
  <main class="editor" id="editor">
    <div class="editor-inner" id="editor-inner">
      <!-- Rendered by JS -->
    </div>
    <div class="savebar" id="savebar">
      <span class="sb-text"><strong>3 unsaved changes</strong> &nbsp;·&nbsp; <span id="dirty-summary">stem · options · answer (standard)</span></span>
      <button class="sb-btn" type="button" id="sb-discard">Discard</button>
      <button class="sb-btn sb-btn-primary" type="button" id="sb-save">
        Save changes
        <span class="sb-kbd">⌘S</span>
      </button>
    </div>
  </main>

  <!-- =========================== INSPECTOR =========================== -->
  <aside class="inspector-rail" aria-label="Inspector">
    <button class="inspector-btn" data-panel="links" type="button" title="Topic & block links">
      <svg class="ico-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="ipip" id="ipip-links">3</span>

      <svg class="ico-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/></svg>
      <span class="ipip" id="ipip-contexts" style="display:none">1</span>
    </button>
    <button class="inspector-btn" data-panel="ai" type="button" title="AI assist">
      <svg class="ico-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5z"/></svg>
    </button>
    <button class="inspector-btn" data-panel="history" type="button" title="History">
      <svg class="ico-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </button>
    <div class="rail-spacer"></div>
    <button class="inspector-btn" type="button" title="Outline / mini-map">
      <svg class="ico-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h12M8 12h12M8 18h12M3 6h.01M3 12h.01M3 18h.01"/></svg>

// UTILITIES

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function escape(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function questionById(id) { return STATE.questions.find(q => q.id === id); }
function sectionById(id)  { return STATE.paper.sections.find(s => s.id === id); }
function contextById(id)  { return STATE.paper.contexts.find(c => c.id === id); }
function childrenOf(parentId) { return STATE.questions.filter(q => q.parentId === parentId); }
function questionsForSection(sectionId) { return STATE.questions.filter(q => q.section === sectionId && q.parentId === null); }

function answerFillState(q, depth) {
  const a = q.answers?.[depth];
  if (!a) return 'empty';
  if (!a.content || !a.content.trim() || a.content.trim() === '<p></p>') return 'empty';
  return 'full';
}

function questionDots(q) {
  const order = ['quick','standard','deep_dive'];
  if (q.type === 'group') {
    const kids = childrenOf(q.id);
    if (kids.length === 0) return order.map(() => 'empty');
    return order.map(d => {
      const states = kids.map(k => answerFillState(k, d));
      if (states.every(s => s === 'full'))   return 'full';
      if (states.every(s => s === 'empty'))  return 'empty';
      return 'partial';
    });
  }
  return order.map(d => answerFillState(q, d));
}

function markDirty(label) {
  STATE.ui.dirty = true;
  STATE.ui.dirtyChanges.add(label);
  renderSaveState();
  renderSaveBar();

function clearDirty() {
  STATE.ui.dirty = false;
  STATE.ui.dirtyChanges.clear();

function toast(text) {
  const el = $('#toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2200);

// =============================================================
// DRILL PATH HELPERS
// =============================================================
function ancestorChainOf(qid) {
  const chain = [];
  let q = questionById(qid);
  if (!q) return chain;
  while (q.parentId) {
    q = questionById(q.parentId);
    if (!q) break;
    chain.unshift(q.id);
  }
  return chain;
}

/**
 * drillPath = chain of group-ancestor IDs leading to the selected question.
 * If the selected question is itself a group, it is APPENDED so col 2 shows
 * its children. Otherwise col 2 shows the children of the parent group (or
 * the section's top-level questions if no parent).
 */
function computeDrillPath(qid) {
  const chain = ancestorChainOf(qid);
  const q = questionById(qid);
  if (q && q.type === 'group') chain.push(q.id);
  return chain;
}

function currentParentId() {
  const path = STATE.ui.drillPath;
  return path.length === 0 ? null : path[path.length - 1];
}

function currentLevelItems() {
  const parentId = currentParentId();
  if (parentId === null) {
    return questionsForSection(STATE.ui.activeSectionId);
  }
  return childrenOf(parentId);
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return tmp.textContent || '';
}

function ctxGlyph(type) {
  if (type === 'passage') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v4H4zM4 12h16v4H4zM4 20h10v0H4z"/></svg>`;

}

    const row = document.createElement('div');

    row.dataset.selected =

        ? 'true' : 'false';

    const qs = questionsForSection(section.id);
    let total = qs.length;
    for (const q of qs) total += childrenOf(q.id).length;

      <span class="sec-letter">${letter}</span>

    const a = questionById(ancestorId);
    if (a) crumbs.push({ kind: 'question', id: a.id, label: a.number });
  }
  const headChunks = [];
  headChunks.push('<nav class="col2-crumbs" aria-label="Drill path">');
  crumbs.forEach((c, i) => {
    if (i > 0) headChunks.push('<span class="cseg-sep">›</span>');
    const isLast = i === crumbs.length - 1;
    if (isLast) {
      headChunks.push(`<span class="cseg cseg-leaf">${escape(c.kind === 'section' ? stripSectionLabel(c.label) : c.label)}</span>`);
    } else {
      headChunks.push(`<span class="cseg" data-crumb-i="${i}">${escape(c.kind === 'section' ? stripSectionLabel(c.label) : c.label)}</span>`);
    }
  });
  headChunks.push('</nav>');

  const parentId = currentParentId();
  const items = currentLevelItems();
  const titleText = parentId === null
    ? stripSectionLabel(section.label)
    : `${questionById(parentId).number} · sub-questions`;
  const countText = `${items.length} item${items.length === 1 ? '' : 's'}`;

    <div class="col2-title">

        else { renderColSections(); renderColQuestions(); renderEditor(); }
