        <strong>No questions yet.</strong><br>
        ${parentId === null ? 'Add the first question to this section.' : 'Add a sub-question.'}
      </div>
    `;
  } else {
    for (const q of items) scroll.appendChild(renderColQRow(q));
  }

  // Add-question button
  const add = document.createElement('button');
  add.className = 'col-q-add';
  add.type = 'button';
  add.innerHTML = `
    <svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    ${parentId === null ? 'Add question' : 'Add sub-question'}
  `;
  add.addEventListener('click', () => enterDraftMode(STATE.ui.activeSectionId, parentId));
  scroll.appendChild(add);
}

function renderColQRow(q) {
  const row = document.createElement('div');
  row.className = 'col-q-row';
  const isSelected = (STATE.ui.selectedId === q.id && !STATE.ui.isDraft);
  row.dataset.selected = isSelected ? 'true' : 'false';
  const kids = childrenOf(q.id);
  const isGroup = q.type === 'group';
  const stemText = stripHtml(q.stem.html).slice(0, 80) || '(untitled)';
  const dots = questionDots(q);
  row.innerHTML = `
    <span class="qnum">${escape(q.number)}</span>
    <div class="qbody">
      <span class="qstem">${escape(stemText)}</span>
      <div class="qmeta">
        <span class="type-pip">${TYPE_META[q.type].short}</span>
        <span class="marks-pip">${q.marks ?? '—'}m</span>
        ${kids.length > 0 ? `<span class="qchildren">${kids.length} sub</span>` : ''}
      </div>
    </div>
    <div class="qright">
      <span class="dots" title="Answer fill: quick · standard · deep-dive">
        <span class="dot" data-fill="${dots[0]}"></span>
        <span class="dot" data-fill="${dots[1]}"></span>
        <span class="dot" data-fill="${dots[2]}"></span>
      </span>
      ${isGroup ? `<span class="drill-chev" aria-hidden>›</span>` : ''}
    </div>
  `;
  row.addEventListener('click', () => selectQuestion(q.id));
  return row;
}

function renderCol2Contexts() {
  const head = $('#col2-head');
  const bulkbar = $('#col2-bulkbar');
  const scroll = $('#col2-scroll');
  head.innerHTML = `
    <nav class="col2-crumbs">
      <span class="cseg cseg-leaf">Shared contexts</span>
    </nav>
    <div class="col2-title">
      <span class="t">Shared contexts</span>
      <span class="t-count">${STATE.paper.contexts.length} total</span>
    </div>
  `;
  bulkbar.innerHTML = `
    <button class="bb-act" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> New context</button>
    <span class="bb-spacer"></span>
    <button class="bb-act" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.35-4.35M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg></button>
  `;
  scroll.innerHTML = '';
  if (STATE.paper.contexts.length === 0) {
    scroll.innerHTML = `
      <div class="col2-empty">
        <strong>No shared contexts yet.</strong><br>
        Add a passage, diagram, or data table that multiple questions can reference.
      </div>
    `;
    return;
  }
  for (const c of STATE.paper.contexts) {
    const row = document.createElement('div');
    row.className = 'col-ctx-row';
    row.innerHTML = `
      <span class="ctx-glyph">${ctxGlyph(c.type)}</span>
      <div class="ctx-body">
        <div class="ctx-title">${escape(c.title)}</div>
        <div class="ctx-meta">${escape(c.type)}</div>
      </div>
      <span class="ctx-uses">${c.uses}q</span>
    `;
    row.addEventListener('click', () => toast(`Context · ${c.title}`));
    scroll.appendChild(row);
  }
}

// =============================================================
// COL-NAV ACTIONS
// =============================================================
function activateSection(sectionId) {
  STATE.ui.col1Mode = 'sections';
  STATE.ui.activeSectionId = sectionId;
  // Reset drill + select first top-level Q in the new section
  STATE.ui.drillPath = [];
  const firstQ = questionsForSection(sectionId)[0];
  if (firstQ) {
    selectQuestion(firstQ.id, { skipRenderCol1: true });
  } else {
    STATE.ui.selectedId = null;
    renderColSections();
    renderColQuestions();
    renderEditor();
  }
}

function activateContexts() {
  STATE.ui.col1Mode = 'contexts';
  STATE.ui.selectedId = null;
  STATE.ui.drillPath = [];
  STATE.ui.isDraft = false;
  renderColSections();
  renderColQuestions();
  renderEditor();
}

// Compat shim — kept so existing call sites keep working
function renderTree() {
  renderColSections();
  renderColQuestions();
}

// =============================================================
// RENDER — EDITOR
// =============================================================
function renderEditor() {
  const inner = $('#editor-inner');
  inner.innerHTML = '';
  if (STATE.ui.isDraft) {
    inner.appendChild(renderDraft());
  } else {
    const q = questionById(STATE.ui.selectedId);
    if (!q) {
      inner.innerHTML = `<div style="padding:80px 0;text-align:center;color:var(--fg-subtle)">Select a question to edit</div>`;
      return;
    }
    inner.appendChild(renderQuestionHeader(q));
    inner.appendChild(renderAnchorStrip(q));
    inner.appendChild(renderStemSection(q));
    inner.appendChild(renderTypedBodySection(q));
    inner.appendChild(renderAnswersSection(q));
    inner.appendChild(renderMetadataSection(q));
    // Update crumb
    $('#crumb-active').textContent = `${STATE.paper.title} · ${q.number}`;
  }
}

function renderQuestionHeader(q) {
  const wrap = document.createElement('div');
  wrap.className = 'qhead-sticky';
  const section = sectionById(q.section);
  const meta = TYPE_META[q.type];
  const titleSnippet = stripHtml(q.stem.html).split(/\n/)[0].slice(0, 80) || 'Untitled question';

  wrap.innerHTML = `
    <nav class="qhead-crumbs">
      <span>${escape(STATE.paper.course_code)}</span>
      <span class="sep">›</span>
      <span>${escape(section.label)}</span>
      <span class="sep">›</span>
      <span>${escape(q.number)}</span>
    </nav>
    <h1 class="qhead-title">
      <span class="qhead-num">${escape(q.number)} ·</span>
      <span>${escape(titleSnippet)}</span>
    </h1>
    <div class="qhead-meta">
      <span class="badge badge--type" data-act="change-type" style="cursor:pointer" title="Change question type">
        <span style="font-family:var(--font-mono);font-size:10px;opacity:0.8">${meta.glyph}</span>
        ${escape(meta.label)}
      </span>
      <span class="badge badge--marks" data-act="edit-marks" style="cursor:pointer">${q.marks} marks</span>
      <span class="badge badge--status-${q.status}">${statusLabel(q.status)}</span>
      ${q.difficulty ? `<span class="badge badge--marks" style="text-transform:capitalize">${escape(q.difficulty)}</span>` : ''}
      ${q.bloom ? `<span class="badge badge--marks" style="text-transform:capitalize">${escape(q.bloom)}</span>` : ''}
    </div>
  `;
  // Click handlers via delegation
  wrap.addEventListener('click', (e) => {
    const t = e.target.closest('[data-act]');
    if (!t) return;
    if (t.dataset.act === 'change-type') openTypeChanger(t);
    if (t.dataset.act === 'edit-marks')   openMarksEditor(t, q);
  });
  return wrap;
}

function statusLabel(s) {
  if (s === 'published') return 'Published';
  if (s === 'in_review') return 'In review';
  if (s === 'draft')     return 'Draft';
  if (s === 'archived')  return 'Archived';
  return s;
}

function renderAnchorStrip(q) {
  const wrap = document.createElement('div');
  wrap.className = 'anchor-strip';
  const sections = [
    { key: 'stem',    label: 'Stem' },
    { key: 'body',    label: bodyLabelForType(q.type) },
    { key: 'answers', label: q.type === 'group' ? 'Children' : 'Answer keys' },
    { key: 'meta',    label: 'Metadata' },
  ];
  for (const s of sections) {
    const a = document.createElement('a');
    a.className = 'anchor-link';
    a.href = `#sec-${s.key}`;
    a.dataset.anchor = s.key;
    if (STATE.ui.activeAnchor === s.key) a.setAttribute('aria-current', 'true');
    a.innerHTML = `${escape(s.label)}`;
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(`sec-${s.key}`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      STATE.ui.activeAnchor = s.key;
      $$('.anchor-link', wrap).forEach(el => el.removeAttribute('aria-current'));
      a.setAttribute('aria-current', 'true');
    });
    wrap.appendChild(a);
  }
  const spacer = document.createElement('span');
  spacer.className = 'anchor-spacer';
  wrap.appendChild(spacer);
  const savedNote = document.createElement('span');
  savedNote.className = 'strip-saved';
  savedNote.textContent = `id: ${q.id} · v3`;
  wrap.appendChild(savedNote);
  return wrap;
}

function bodyLabelForType(type) {
  switch (type) {
    case 'mcq': case 'multi_select_mcq': return 'Options';
    case 'true_false': return 'Options';
    case 'matching': case 'matrix_matching': return 'Pairs';
    case 'ordering': return 'Sequence';
    case 'numeric_entry': case 'calculation': return 'Numeric';
    case 'group': return 'Sub-questions';
    case 'fill_blank': case 'cloze': return 'Blanks';
    case 'diagram_label': return 'Diagram';
    case 'assertion_reason': return 'Statements';
    default: return 'Body';
  }
}

// === Stem ===
function renderStemSection(q) {
  const wrap = document.createElement('section');
  wrap.className = 'doc-section';
  wrap.id = 'sec-stem';
  wrap.innerHTML = `
    <div class="doc-section-head">
      <h2>Stem</h2>
      <span class="hint">The question as students will see it.</span>
      <button class="h-action" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="19.4" cy="12" r="1"/><circle cx="4.6" cy="12" r="1"/></svg></button>
    </div>
    <div class="stem-composer">
      <div class="stem-toolbar">
        <button class="stem-tool" type="button" data-tool="bold" title="Bold (⌘B)"><span style="font-weight:700">B</span></button>
        <button class="stem-tool" type="button" data-tool="italic" title="Italic (⌘I)"><span style="font-style:italic">I</span></button>
        <button class="stem-tool" type="button" data-tool="code" title="Code"><span class="key">{ }</span></button>
        <span class="stem-tool-sep"></span>
        <button class="stem-tool" type="button" data-tool="h2" title="Heading"><span class="key">H</span></button>
        <button class="stem-tool" type="button" data-tool="list" title="List"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
        <button class="stem-tool" type="button" data-tool="codeblock" title="Code block"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg></button>
        <button class="stem-tool" type="button" data-tool="math" title="Math (KaTeX)"><span class="key">∑</span></button>
        <button class="stem-tool" type="button" data-tool="image" title="Image"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg></button>
        <button class="stem-tool" type="button" data-tool="table" title="Table"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></button>
        <span class="stem-tool-sep"></span>
        <button class="stem-tool" type="button" data-tool="ai" title="AI assist"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5z"/></svg></button>
      </div>
      <div class="stem-body" contenteditable="true" data-q="${q.id}">${q.stem.html}</div>
    </div>
  `;
  const body = $('.stem-body', wrap);
  body.addEventListener('input', () => {
    q.stem.html = body.innerHTML;
    markDirty('stem');
  });
  $$('.stem-tool', wrap).forEach(btn => {
    btn.addEventListener('click', () => toast(`Editor command · ${btn.dataset.tool}`));
  });
  return wrap;
}

// === Typed body ===
function renderTypedBodySection(q) {
  const wrap = document.createElement('section');
  wrap.className = 'doc-section';
  wrap.id = 'sec-body';

  const headHTML = (hint, action) => `
    <div class="doc-section-head">
      <h2>${escape(bodyLabelForType(q.type))}</h2>
      <span class="hint">${escape(hint)}</span>
      ${action ? action : ''}
    </div>`;

  if (q.type === 'mcq' || q.type === 'multi_select_mcq') {
    wrap.innerHTML = headHTML(
      q.type === 'multi_select_mcq' ? 'Toggle every correct option.' : 'Toggle the correct option.',
      `<button class="h-action" type="button" data-act="shuffle"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20l16-16M21 16v5h-5M15 15l6 6"/></svg> Shuffle</button>`
    );
    const list = document.createElement('div');
    list.className = 'opt-list';
    for (const opt of q.options) list.appendChild(renderOption(q, opt));
    const addBtn = document.createElement('button');
    addBtn.className = 'opt-add';
    addBtn.type = 'button';
    addBtn.innerHTML = `<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add option`;
    addBtn.addEventListener('click', () => {
      const nextLetter = String.fromCharCode(65 + q.options.length);
      q.options.push({ id: 'opt-' + Date.now(), label: nextLetter, text: '', correct: false });
      markDirty('options');
      renderEditor();
    });
    list.appendChild(addBtn);
    wrap.appendChild(list);
    return wrap;
  }

  if (q.type === 'matching') {
    wrap.innerHTML = headHTML('Each row is a correct pairing. Students see the columns shuffled.',
      `<button class="h-action" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add pair</button>`
    );
    const list = document.createElement('div');
    list.className = 'match-list';
    for (const p of q.pairs) {
      const row = document.createElement('div');
      row.className = 'match-row';
      row.innerHTML = `
        <div class="match-cell" contenteditable="true" data-ph="Left item">${escape(p.left)}</div>
        <div class="match-link">↔</div>
        <div class="match-cell" contenteditable="true" data-ph="Match">${escape(p.right)}</div>
        <button class="match-remove" type="button" title="Remove pair"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
      `;
      $$('.match-cell', row).forEach(c => {
        c.addEventListener('input', () => markDirty('pairs'));
      });
      $('.match-remove', row).addEventListener('click', () => {
        q.pairs = q.pairs.filter(x => x.id !== p.id);
        markDirty('pairs');
        renderEditor();
      });
      list.appendChild(row);
    }
    wrap.appendChild(list);
    return wrap;
  }

  if (q.type === 'numeric_entry' || q.type === 'calculation') {
    wrap.innerHTML = headHTML('Expected numeric answer with allowed tolerance.', '');
    const n = q.numeric || { answer: '', unit: '', tolerance: 0 };
    const grid = document.createElement('div');
    grid.className = 'num-grid';
    grid.innerHTML = `
      <div class="num-field"><label>Answer</label><input type="text" value="${escape(n.answer)}" placeholder="e.g. 4.00" /></div>
      <div class="num-field"><label>Unit</label><input type="text" value="${escape(n.unit)}" placeholder="× / m/s / kg" /></div>
      <div class="num-field"><label>Tolerance (±)</label><input type="text" value="${escape(n.tolerance)}" placeholder="0.1" /></div>
      <div class="num-field"><label>Significant figures</label><input type="text" value="3" /></div>
    `;
    $$('input', grid).forEach(i => i.addEventListener('input', () => markDirty('numeric')));
    wrap.appendChild(grid);
    return wrap;
  }

  if (q.type === 'true_false') {
    wrap.innerHTML = headHTML('Mark which statement is correct.', '');
    const list = document.createElement('div');
    list.className = 'opt-list';
    const tfOpts = [
      { id:'tf-true',  label:'T', text:'True',  correct: q.tfCorrect === true  },
      { id:'tf-false', label:'F', text:'False', correct: q.tfCorrect === false },
    ];
    for (const o of tfOpts) {
      const row = document.createElement('div');
      row.className = 'opt-row';
      row.dataset.correct = o.correct ? 'true' : 'false';
      row.innerHTML = `
        <div class="opt-marker">
          <span class="opt-letter">${o.label}</span>
          <button class="opt-correct-toggle" type="button"><svg class="check" viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 8l3.5 3.5L13 5"/></svg></button>
        </div>
        <div class="opt-body" contenteditable="false">${o.text}</div>
      `;
      row.addEventListener('click', () => {
        q.tfCorrect = (o.id === 'tf-true');
        markDirty('options');
        renderEditor();
      });
      list.appendChild(row);
    }
    wrap.appendChild(list);
    return wrap;
  }

  if (q.type === 'group') {
    wrap.innerHTML = headHTML('Sub-questions appear together. Each child has its own answer keys & marks.',
      `<button class="h-action" type="button" data-act="add-child"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Add sub-question</button>`
    );
    const list = document.createElement('div');
    list.className = 'group-children';
    for (const child of childrenOf(q.id)) {
      const row = document.createElement('div');
      row.className = 'gchild';
      row.innerHTML = `
        <span class="gc-num">${escape(child.number)}</span>
        <span class="gc-stem">${escape(stripHtml(child.stem.html))}</span>
        <span class="gc-type">${TYPE_META[child.type].short}</span>
        <span class="gc-marks">${child.marks ?? '—'} marks</span>
      `;
      row.addEventListener('click', () => selectQuestion(child.id));
      list.appendChild(row);
    }
    wrap.appendChild(list);
    $('[data-act="add-child"]', wrap)?.addEventListener('click', () => {
      const next = String.fromCharCode(97 + childrenOf(q.id).length); // a, b, c…
      const num = `${q.number.replace(/^Q/i,'')}${next}`;
      const child = {
        id: 'q-' + Date.now(),
        section: q.section,
        number: num,
        parentId: q.id,
        type: 'theory',
        marks: 5,
        status: 'draft',
        difficulty: 'medium',
        bloom: 'apply',
        stem: { html: '<p></p>' },
        answers: { quick:{filled:false,content:''}, standard:{filled:false,content:''}, deep_dive:{filled:false,content:''} },
        links: { topics: [], blocks: [] }, contexts: [],
      };
      STATE.questions.push(child);
      renderTree();
      selectQuestion(child.id);
    });
    return wrap;
  }

  // Default: theory / short_answer / essay → just a "model answer" panel handled in Answer Keys
  wrap.innerHTML = headHTML('Free-form questions are answered in the Answer Keys section below.', '');
  const note = document.createElement('div');
  note.style.cssText = 'padding:18px 22px;background:var(--surface);border:1px dashed var(--border);border-radius:10px;color:var(--fg-subtle);font-size:13px;line-height:1.6';
  note.innerHTML = `For <strong style="color:var(--fg)">${escape(TYPE_META[q.type].label)}</strong> questions, students write their answer in a text area. Provide a model response and marking guidance at three depth levels (Quick / Standard / Deep dive) below — these power graders and student review.`;
  wrap.appendChild(note);
  return wrap;
}

function renderOption(q, opt) {
  const row = document.createElement('div');
  row.className = 'opt-row';
  row.dataset.correct = opt.correct ? 'true' : 'false';
  row.innerHTML = `
    <div class="opt-marker">
      <span class="opt-letter">${escape(opt.label)}</span>
      <button class="opt-correct-toggle" type="button" title="Mark correct">
        <svg class="check" viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 8l3.5 3.5L13 5"/></svg>
      </button>
    </div>
    <div class="opt-body" contenteditable="true" data-ph="Option text…">${opt.text}</div>
    <div class="opt-actions">
      <button class="opt-act" type="button" title="Move up"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg></button>
      <button class="opt-act" type="button" title="Move down"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
      <button class="opt-act" type="button" title="Delete"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
    </div>
  `;
  $('.opt-correct-toggle', row).addEventListener('click', () => {
    if (q.type === 'mcq') {
      q.options.forEach(o => { o.correct = (o.id === opt.id); });
    } else {
      opt.correct = !opt.correct;
    }
    markDirty('options');
    renderEditor();
  });
  $('.opt-body', row).addEventListener('input', (e) => {
    opt.text = e.currentTarget.innerHTML;
    markDirty('options');
  });
  $$('.opt-act', row)[2].addEventListener('click', () => {
    q.options = q.options.filter(o => o.id !== opt.id);
    // Relabel
    q.options.forEach((o, i) => { o.label = String.fromCharCode(65 + i); });
    markDirty('options');
    renderEditor();
  });
  return row;
}

// === Answers ===
function renderAnswersSection(q) {
  const wrap = document.createElement('section');
  wrap.className = 'doc-section';
  wrap.id = 'sec-answers';

  if (q.type === 'group') {
    wrap.innerHTML = `
      <div class="doc-section-head">
        <h2>Children's answers</h2>
        <span class="hint">A group question doesn't carry its own answer keys — each sub-question does.</span>
      </div>
      <div style="padding:18px 22px;background:var(--surface);border:1px dashed var(--border);border-radius:10px;color:var(--fg-subtle);font-size:13px">
        Open a sub-question above to edit its answer keys. Aggregate fill state is shown in the tree.
      </div>
    `;
    return wrap;
  }

  const depths = [
    { key: 'quick',     label: 'Quick',     hint: 'A one-liner the student can scan.',                       sub: '~25 words' },
    { key: 'standard',  label: 'Standard',  hint: 'The default explanation when a student reveals the answer.', sub: '~80 words' },
    { key: 'deep_dive', label: 'Deep dive', hint: 'Full pedagogical answer with reasoning, examples, edge cases.', sub: '~250 words' },
  ];

  const fillStates = depths.map(d => answerFillState(q, d.key));

  wrap.innerHTML = `
    <div class="doc-section-head">
      <h2>Answer keys</h2>
      <span class="hint">Each depth serves a different reveal level. All three are checked by graders.</span>
      <button class="h-action" type="button" data-act="ai-all"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5z"/></svg> Generate all with AI</button>
    </div>
    <div class="depths-bar" role="tablist">
      ${depths.map((d, i) => `
        <button class="depth-seg" role="tab" data-active="${STATE.ui.activeDepth === d.key}" data-fill="${fillStates[i]}" data-depth="${d.key}">
          <span class="seg-dot"></span>
          ${escape(d.label)}
          <span class="seg-label-2">${escape(d.sub)}</span>
        </button>
      `).join('')}
    </div>
    <div id="depth-card-mount"></div>
  `;

  $$('.depth-seg', wrap).forEach(btn => {
    btn.addEventListener('click', () => {
      STATE.ui.activeDepth = btn.dataset.depth;
      $$('.depth-seg', wrap).forEach(b => b.dataset.active = (b === btn));
      renderDepthCard(q);
    });
  });

  // Initial card
  setTimeout(() => renderDepthCard(q), 0);

  return wrap;
}

function renderDepthCard(q) {
  const mount = $('#depth-card-mount');
  if (!mount) return;
  mount.innerHTML = '';
  const depthKey = STATE.ui.activeDepth;
  const depths = {
    quick:     { label: 'Quick',     hint: 'A one-liner the student can scan when they just need the answer.' },
    standard:  { label: 'Standard',  hint: 'The default reveal — explain the answer with the key reasoning.' },
    deep_dive: { label: 'Deep dive', hint: 'A teaching-grade answer. Edge cases, examples, derivations.' },
  };
  const d = depths[depthKey];
  const a = q.answers?.[depthKey] || { content: '', filled: false };
  const fillState = answerFillState(q, depthKey);

  const card = document.createElement('div');
  card.className = 'depth-card';
  card.innerHTML = `
    <div class="depth-card-head">
      <div class="dh-left">
        <h3>${d.label} answer</h3>
        <span class="dh-meta">${escape(d.hint)}</span>
      </div>
      <div class="dh-actions">
        ${fillState === 'full' ? `<button class="dh-act" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4M12 22a10 10 0 1 1 0-20 10 10 0 0 1 0 20z"/></svg> Approved</button>` : ''}
        <button class="dh-act dh-act-ai" type="button" data-act="ai-this"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5z"/></svg> ${fillState === 'full' ? 'Refine' : 'Generate'}</button>
        <button class="dh-act" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="19.4" cy="12" r="1"/><circle cx="4.6" cy="12" r="1"/></svg></button>
      </div>
    </div>
    ${fillState === 'empty' ? `
      <div class="depth-empty">
        <p class="e-line">No ${d.label.toLowerCase()} answer yet.</p>
        <div class="e-actions">
          <button class="e-btn" type="button" data-act="write">
            <svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4z"/></svg>
            Write manually
          </button>
          <button class="e-btn e-btn-ai" type="button" data-act="ai-this">
            <svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L9.5 8.5 3 11l6.5 2.5L12 20l2.5-6.5L21 11l-6.5-2.5z"/></svg>
            Generate with AI
          </button>
        </div>
      </div>
    ` : `
      <div class="depth-body" contenteditable="true" data-ph="Write the ${d.label.toLowerCase()} answer…">${a.content || ''}</div>
    `}
  `;
  mount.appendChild(card);

  const body = $('.depth-body', card);
  if (body) {
    body.addEventListener('input', () => {
      if (!q.answers[depthKey]) q.answers[depthKey] = {};
      q.answers[depthKey].content = body.innerHTML;
      q.answers[depthKey].filled = !!body.textContent.trim();
      markDirty(`answer · ${depthKey}`);
      // Update depth-bar dot live
      const seg = $(`.depth-seg[data-depth="${depthKey}"]`);
      if (seg) seg.dataset.fill = answerFillState(q, depthKey);
      // Update col-2 row dots live
      const colRow = $$('.col-q-row').find(r => $('.qnum', r)?.textContent === q.number);
      if (colRow) {
        const dots = questionDots(q);
        $$('.dot', colRow).forEach((dot, i) => { dot.dataset.fill = dots[i]; });
      }
    });
  }
  $$('[data-act="write"]', card).forEach(btn => btn.addEventListener('click', () => {
    if (!q.answers[depthKey]) q.answers[depthKey] = {};
    q.answers[depthKey].content = '<p></p>';
    q.answers[depthKey].filled = false;
    renderDepthCard(q);
    setTimeout(() => $('.depth-body')?.focus(), 0);
  }));
  $$('[data-act="ai-this"]', card).forEach(btn => btn.addEventListener('click', () => {
    toast(`AI requested · ${d.label} answer`);
    setInspectorPanel('ai');
  }));
}

function renderDraft() {
  const wrap = document.createElement('div');
  wrap.style.paddingTop = '32px';
  const section = sectionById(STATE.ui.draftSectionId);
  const parentId = STATE.ui.draftParentId;
  const parentChain = parentId ? [...ancestorChainOf(parentId), parentId] : [];
  const parentCrumbs = parentChain.map(id => questionById(id)?.number).filter(Boolean);
  const titleText = parentId ? 'New sub-question' : 'New question';
  const crumbHtml = `
    <span>${escape(STATE.paper.course_code)}</span>
    <span class="sep">›</span>
    <span>${escape(stripSectionLabel(section.label))}</span>
    ${parentCrumbs.map(n => `<span class="sep">›</span><span>${escape(n)}</span>`).join('')}
    <span class="sep">›</span>
    <span>${escape(titleText)}</span>
  `;
  wrap.innerHTML = `
    <div class="qhead-sticky" style="position:static;margin:0;padding:0">
      <nav class="qhead-crumbs">${crumbHtml}</nav>
      <h1 class="qhead-title">
        <span>${escape(titleText)}</span>
      </h1>
      <div class="qhead-meta">
        <span class="badge badge--status-draft">Draft</span>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">Pick a type, write the stem, then save.</span>
      </div>
    </div>
    <div class="doc-section" style="margin-top:32px">
      <div class="doc-section-head">
        <h2>Question type</h2>
        <span class="hint">You can change this later.</span>
      </div>
      <div class="type-picker" id="type-picker">
        ${Object.entries(TYPE_META).filter(([k]) => k !== 'group' || true).map(([key, meta]) => `
          <button class="type-tile" data-type="${key}" data-active="${STATE.ui.draftType === key}" type="button">
            <div class="tt-head">
              <span class="tt-glyph">${escape(meta.glyph)}</span>
              <span class="tt-name">${escape(meta.label)}</span>
            </div>
            <span class="tt-hint">${escape(meta.hint)}</span>
          </button>
        `).join('')}
      </div>
    </div>
    <div class="doc-section">
      <div class="doc-section-head">
        <h2>Stem</h2>
        <span class="hint">Start typing. You can add options, pairs, etc. after saving.</span>
      </div>
      <div class="stem-composer">
        <div class="stem-toolbar">
          <button class="stem-tool" type="button"><span style="font-weight:700">B</span></button>
          <button class="stem-tool" type="button"><span style="font-style:italic">I</span></button>
          <button class="stem-tool" type="button"><span class="key">{ }</span></button>
          <span class="stem-tool-sep"></span>
          <button class="stem-tool" type="button"><span class="key">∑</span></button>
        </div>
        <div class="stem-body" id="draft-stem" contenteditable="true" data-ph="Type the question…"></div>
      </div>
    </div>
    <div class="doc-section">
      <div class="doc-section-head">
        <h2>&nbsp;</h2>
      </div>
      <div style="display:flex;gap:8px">
        <button class="tbtn" type="button" id="draft-cancel">Cancel</button>
        <button class="tbtn tbtn-primary" type="button" id="draft-save"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg> Save & continue authoring</button>
      </div>
    </div>
  `;

  setTimeout(() => {
    $$('.type-tile', wrap).forEach(btn => {
      btn.addEventListener('click', () => {
        STATE.ui.draftType = btn.dataset.type;
        $$('.type-tile', wrap).forEach(b => b.dataset.active = (b === btn));
      });
    });
    $('#draft-cancel', wrap)?.addEventListener('click', exitDraftMode);
    $('#draft-save', wrap)?.addEventListener('click', () => {
      const stem = $('#draft-stem', wrap).innerHTML.trim();
      if (!stem) { toast('Add the question stem first'); return; }
      const sectionId = STATE.ui.draftSectionId;
      const parentId = STATE.ui.draftParentId;
      let num;
      if (parentId) {
        const parent = questionById(parentId);
        const siblings = childrenOf(parentId);
        const next = String.fromCharCode(97 + siblings.length); // a, b, c…
        num = `${parent.number.replace(/^Q/i,'')}${next}`;
      } else {
        num = `Q${questionsForSection(sectionId).length + 1}`;
      }
      const newQ = {
        id: 'q-' + Date.now(),
        section: sectionId,
        number: num,
        parentId: parentId,
        type: STATE.ui.draftType,
        marks: 5,
        status: 'draft',
        difficulty: null, bloom: null,
        stem: { html: stem },
        options: ['mcq','multi_select_mcq'].includes(STATE.ui.draftType) ? [
          { id:'a', label:'A', text:'', correct:false },
          { id:'b', label:'B', text:'', correct:false },
        ] : undefined,
        pairs: STATE.ui.draftType === 'matching' ? [
          { id:'p1', left:'', right:'' },
        ] : undefined,
        answers: { quick:{filled:false,content:''}, standard:{filled:false,content:''}, deep_dive:{filled:false,content:''} },
        links: { topics: [], blocks: [] }, contexts: [],
      };
      STATE.questions.push(newQ);
      exitDraftMode();
      selectQuestion(newQ.id);
      toast(`Created ${num}`);
    });
    $('#draft-stem', wrap)?.focus();
  }, 0);

  return wrap;
}

function enterDraftMode(sectionId, parentId) {
  STATE.ui.isDraft = true;
  STATE.ui.draftSectionId = sectionId;
  STATE.ui.draftParentId = parentId || null;
  STATE.ui.draftType = parentId ? 'theory' : 'mcq';
  renderColSections();
  renderColQuestions();
  renderEditor();
}
function exitDraftMode() {
  STATE.ui.isDraft = false;
  STATE.ui.draftSectionId = null;
  STATE.ui.draftParentId = null;
  renderColSections();
  renderColQuestions();
  renderEditor();
}

// =============================================================
// SELECT
// =============================================================
function selectQuestion(id, opts = {}) {
  if (STATE.ui.dirty && !opts.fromCrumb && !opts.skipRenderCol1) {
    if (!confirm('You have unsaved changes. Discard them and continue?')) return;
    clearDirty();
  } else if (STATE.ui.dirty) {
    clearDirty();
  }
  const q = questionById(id);
  if (!q) return;
  // Find the section this question lives under (walking parents)
  let walker = q;
  while (walker.parentId) walker = questionById(walker.parentId) || walker;
  STATE.ui.activeSectionId = walker.section;
  STATE.ui.col1Mode = 'sections';
  STATE.ui.drillPath = computeDrillPath(id);
  STATE.ui.selectedId = id;
  STATE.ui.isDraft = false;
  STATE.ui.activeDepth = 'standard';
  STATE.ui.activeAnchor = 'stem';
  if (!opts.skipRenderCol1) renderColSections();
  renderColQuestions();
  renderEditor();
  $('#editor-inner').scrollTop = 0;
}

function renderSaveState() {
  const el = $('#save-state');
  if (STATE.ui.dirty) {
    el.classList.add('dirty');
    $('#save-state-text').textContent = `Unsaved · ${STATE.ui.dirtyChanges.size} change${STATE.ui.dirtyChanges.size === 1 ? '' : 's'}`;
  } else {
    el.classList.remove('dirty');
    $('#save-state-text').textContent = 'Saved · just now';
  }
}
function renderSaveBar() {
  const bar = $('#savebar');
  if (STATE.ui.dirty) {
    bar.classList.add('show');
    const labels = Array.from(STATE.ui.dirtyChanges);
    $('.sb-text', bar).innerHTML = `<strong>${labels.length} unsaved change${labels.length === 1 ? '' : 's'}</strong> &nbsp;·&nbsp; ${labels.join(' · ')}`;
  } else {
    bar.classList.remove('show');
  }
}

function setInspectorPanel(key) {
  STATE.ui.inspectorPanel = (STATE.ui.inspectorPanel === key) ? null : key;
  $$('.inspector-btn').forEach(b => {
    b.dataset.active = (b.dataset.panel === STATE.ui.inspectorPanel) ? 'true' : 'false';
  });
  const panel = $('#inspector-panel');
  const overlay = $('#sheet-overlay');
  if (STATE.ui.inspectorPanel) {
    renderInspectorPanel(STATE.ui.inspectorPanel);
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    panel.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
    // Move focus to the close button so Esc / Tab feel right
    setTimeout(() => $('#ipanel-close')?.focus(), 60);
  } else {
    panel.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }
}

function closeInspectorPanel() {
  if (STATE.ui.inspectorPanel) setInspectorPanel(STATE.ui.inspectorPanel);
}

  if (key === 'history') {

          <div class="hb-line"><strong>AI</strong> generated <em>Standard</em> answer</div>

function linkCard(kind, title, sub, onRemove) {
  const el = document.createElement('div');
  el.className = 'ilink';
  el.innerHTML = `
    <span class="il-glyph ${kind}">${
      kind === 'topic'   ? `<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>` :
      kind === 'block'   ? `<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>` :
      `<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>`
    }</span>
    <div class="il-body">
      <div class="il-title">${escape(title)}</div>
      <div class="il-sub">${escape(sub)}</div>
    </div>
    <button class="il-remove" type="button"><svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  `;
  $('.il-remove', el).addEventListener('click', () => onRemove && onRemove());
  return el;
}

// =============================================================
// POPOVERS — type changer, marks editor
// =============================================================
function openTypeChanger(anchor) {
  closePopovers();
  const q = questionById(STATE.ui.selectedId);
  if (!q) return;
  const r = anchor.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'popover open';
  pop.style.top = `${r.bottom + 6}px`;
  pop.style.left = `${r.left}px`;
  pop.innerHTML = `
    <div class="pop-label">Change question type</div>
    ${Object.entries(TYPE_META).map(([key, meta]) => `
      <div class="pop-item" data-type="${key}">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);width:18px">${meta.glyph}</span>
        ${escape(meta.label)}
        <span class="pip">${meta.short}</span>
      </div>
    `).join('')}
  `;
  $('#popovers').appendChild(pop);
  $$('.pop-item', pop).forEach(item => item.addEventListener('click', () => {
    q.type = item.dataset.type;
    markDirty('type');
    closePopovers();
    renderEditor();
    renderTree();
  }));
  document.addEventListener('mousedown', closePopoversOnce, { once: true, capture: true });
}

function openMarksEditor(anchor, q) {
  closePopovers();
  const r = anchor.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'popover open';
  pop.style.top = `${r.bottom + 6}px`;
  pop.style.left = `${r.left}px`;
  pop.innerHTML = `
    <div class="pop-label">Marks</div>
    <div style="padding:8px 6px;display:flex;gap:4px;align-items:center">
      <input type="number" id="marks-input" value="${q.marks ?? 0}" min="0" step="1" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:var(--fg);font-family:var(--font-mono);font-size:14px;outline:none">
      <button class="ap-go" type="button" id="marks-save" style="background:var(--primary);color:var(--primary-fg);border:0;border-radius:5px;padding:6px 10px;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:600">Set</button>
    </div>
  `;
  $('#popovers').appendChild(pop);
  setTimeout(() => $('#marks-input', pop).focus(), 0);
  $('#marks-save', pop).addEventListener('click', () => {
    q.marks = parseInt($('#marks-input', pop).value || '0', 10);
    markDirty('marks');
    closePopovers();
    renderEditor();
  });
  document.addEventListener('mousedown', closePopoversOnce, { once: true, capture: true });
}

function closePopovers() {
  $('#popovers').innerHTML = '';
}
function closePopoversOnce(e) {
  if (!e.target.closest('.popover')) closePopovers();
}

// =============================================================
// BOOTSTRAP
// =============================================================
function boot() {
  renderTree();
  renderEditor();
  renderSaveState();

  // Inspector buttons
  $$('.inspector-btn[data-panel]').forEach(btn => {
    btn.addEventListener('click', () => setInspectorPanel(btn.dataset.panel));
  });
  $('#ipanel-close').addEventListener('click', closeInspectorPanel);
  $('#sheet-overlay').addEventListener('click', closeInspectorPanel);

  // Save bar
  $('#sb-discard').addEventListener('click', () => {
    if (!confirm('Discard all unsaved changes?')) return;
    clearDirty();
    renderEditor();
    toast('Discarded changes');
  });
  $('#sb-save').addEventListener('click', () => {
    clearDirty();
    toast('Saved');
  });

  // Theme toggle
  $('#theme-toggle').addEventListener('click', toggleTheme);

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const cmd = e.metaKey || e.ctrlKey;
    if (cmd && e.key === '.') { e.preventDefault(); toggleTheme(); }
    if (cmd && e.key === 's') { e.preventDefault(); if (STATE.ui.dirty) { clearDirty(); toast('Saved'); } }
    if (e.key === 'Escape') { closeInspectorPanel(); closePopovers(); }
  });

  // Mock inspector pip counts based on current selection
  refreshInspectorPips();
}
function refreshInspectorPips() {
  const q = questionById(STATE.ui.selectedId);
  if (!q) return;
  const linkCount = (q.links?.topics?.length || 0) + (q.links?.blocks?.length || 0);
  const lp = $('#ipip-links');
  if (linkCount > 0) { lp.style.display = ''; lp.textContent = linkCount; } else lp.style.display = 'none';
  const ctxCount = q.contexts?.length || 0;
  const cp = $('#ipip-contexts');
  if (ctxCount > 0) { cp.style.display = ''; cp.textContent = ctxCount; } else cp.style.display = 'none';
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  const dark = document.documentElement.classList.contains('dark');
  $('#theme-sun').style.display = dark ? 'none' : '';
  $('#theme-moon').style.display = dark ? '' : 'none';
}

// Wire selection to refresh pips
const origSelectQuestion = selectQuestion;
selectQuestion = function (id) {
  origSelectQuestion(id);
  refreshInspectorPips();
};

document.addEventListener('DOMContentLoaded', boot);
</script>
